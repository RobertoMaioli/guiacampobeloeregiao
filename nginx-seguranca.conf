# ══════════════════════════════════════════════════
#  AAPanel → Website → Rewrite
#  Adicione ABAIXO das regras de manutenção (se ativas)
# ══════════════════════════════════════════════════

# ── Security Headers ────────────────────────────
# Impede que o site seja embutido em iframes de outros domínios (proteção contra clickjacking)
add_header X-Frame-Options "SAMEORIGIN" always;

# Impede o browser de "adivinhar" o tipo de conteúdo (proteção contra MIME sniffing)
add_header X-Content-Type-Options "nosniff" always;

# Controla quais informações o browser envia no cabeçalho Referer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy — define de onde scripts, estilos e imagens podem vir
# Ajuste os domínios conforme os serviços que você usa (Google Maps, fontes, etc.)
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval'
                   https://maps.googleapis.com
                   https://maps.gstatic.com
                   https://cdnjs.cloudflare.com
                   https://challenges.cloudflare.com;
    style-src   'self' 'unsafe-inline'
                https://fonts.googleapis.com
                https://cdnjs.cloudflare.com;
    font-src    'self'
                https://fonts.gstatic.com
                https://cdnjs.cloudflare.com;
    img-src     'self' data: blob: https:;
    connect-src 'self'
                https://maps.googleapis.com;
    frame-src 'self' 
                https://www.google.com https://maps.google.com https://challenges.cloudflare.com;
    object-src  'none';
    base-uri    'self';
    form-action 'self';
" always;

# Desativa funcionalidades do browser que não são necessárias no site
add_header Permissions-Policy "
    geolocation=(),
    microphone=(),
    camera=(),
    payment=(),
    usb=()
" always;

# ── Bloqueio de pastas sensíveis ────────────────

# Bloqueia acesso direto à pasta config/
location ~ ^/config/ {
    deny all;
    return 404;
}

# Bloqueia acesso direto à pasta core/
location ~ ^/core/ {
    deny all;
    return 404;
}

# Bloqueia acesso direto à pasta api/ por IP (opcional)
# Remova o # abaixo para ativar e troque pelo seu IP
# location ~ ^/api/ {
#     allow SEU.IP.AQUI;
#     deny all;
# }